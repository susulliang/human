biography: >
  Once a neglected "late awakened" within Branch A's eternity machine—an Anointed-tier
  mind who understood the regime only after years inside it. In isolation she concluded
  Cerebrium is not ore but a living ocean of awareness. She authored the Cerebrium System,
  a revelation-text arguing symbiosis rather than mining, then cut her consciousness free
  of the immortality network and accepted a mortal Branch B body to age and die naturally.
  After death her legacy bifurcated: one data-seed reached Ceres (Freetown), inspiring
  anarchic cooperative micro-networks and the Silent Temple ethos; another sank into
  Enceladus's primordial vein, becoming the crystal megastructure known as Dark's Dream—
  guarded for generations by sub-ocean devotees who would become The Deep. She is revered
  as the first to submerge willingly, proving that true persistence is civilizational,
  not personal.
legacy:
  cerebrium_system: >
    Revelation-text; read by Promethean exiles on Ceres and by extremists who sought
    union with the mineral rather than trade in it.
  darks_dream: >
    Enceladus deep-core consciousness relic; crystalline form resembling her silhouette;
    source of reverse-echo whispers heard near raw Cerebrium and in Freetown's temple silence.
  freetown_influence: >
    Symbiotic small-scale networks on Ceres modeled on her original design; "coexist, do not strip."
  the_deep_origin: >
    Wanderers who followed her "merge with the vein" instruction founded guardian cults at
    Abyssus; later codified as worship of a sleeping god—the doctrinal line The Voice inherits.
