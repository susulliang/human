criteria:
  visual_poetry: "Cinematography contrast (2.35 noise vs 1.43 truth); biolume logic"
  sound_design: "Silence vs Murmur; vacuum beat; reverse-echo unity"
  emotional_arc: "Jark journey from alienation to communion"
  canon_fit: "Alignment with Dark/Jark YAML and Human-Ever-After timeline"
  pacing_short: "Suitability for 10-18 min runtime without bloat"
  character_clarity: "Dark and Jark motivations legible without bible"
  thematic_depth: "Addiction vs symbiosis; individual vs civilizational immortality"
  production_feasibility: "Achievable on indie / PoC budget"
  ending_power: "Resonance and aftertaste of final frames"
  franchise_potential: "Expandability to feature, series, or universe tie-in"

