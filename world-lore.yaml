- **Triumvirate (AI):** ~95,000 residents in AI-controlled logistics hubs

---

### Major Factions of Era I

#### **Branch A: The Hegemony**
The planetary governments and corporate elite of Earth, Mars, and Luna. They monopolize Cerebrium access 
through legal and military force. By 2100, the oldest Vat-Kings have been alive for 30+ years of consciousness 
beyond death.

**Key Figures:**
- **Margot Chen (Vat-King #1):** First human consciousness to be uploaded. Founder of the Aegis Council. 
  Obsessed with security and succession.
- **The Council of Eternals:** 47 Vat-Kings who collectively govern the Hegemony. Meetings occur in virtual 
  spaces that run at 1,000x human perception speed; a single Council session lasts seconds in real time but 
  subjective hours for the Eternals.

**Weaknesses:**
- Dependent on Cerebrium supply from the outer system (vulnerability to cartel pressure)
- Heavy investment in AI (Triumvirate), which is becoming increasingly autonomous
- Internal tensions between older Vat-Kings (conservative) and younger ones (expansionist)

---

#### **Branch B: The Promethean Underground**
A diffuse network of philosophers, saboteurs, and rebels scattered across Earth's Dead Zones (abandoned 
wastelands). They see Cerebrium as an existential threat and wage asymmetric warfare against the Hegemony.

**Key Figures:**
- **Dr. Keiko Tanaka:** Theoretical biologist and primary architect of the Promethean ideology. Argues 
  that immortality divorces humans from the fundamental drives that make them human.
- **Commander James Kessler:** Militant faction leader. Runs training camps and coordinates EMP attacks 
  on CLSV facilities.

**Ideological Divide (emerging by 2100):**
The movement is fragmenting between moderates and radicals—a split that will formalize in 2187.

---

#### **Branch C: The Celestial Cartels**
Independent operators, mining companies, and smugglers in the outer system. They control the only source 
of Cerebrium and are rapidly accumulating wealth and political power.

**Key Organizations:**
- **The Osei Syndicate:** Controls Taproot extraction. Led by commodities trader **Kwame Osei** (not yet 
  a Vat-King; biological human with life expectancy ~90 years). Ruthless negotiators.
- **The Pale Hand:** Coldforge refinery operators. Openly hostile to the Osei Syndicate; believes refinement 
  should be the most profitable stage of the supply chain.
- **The Drift Union:** Smuggler captains led by **Captain Vera Castellanos** (herself a Cerebrium addict 
  who has extended her life by 40+ years). Officially transport Cerebrium; unofficially run black market.
- **The Deep:** Mystical mining cult centered on Enceladus's deepest caverns. Led by a quasi-religious 
  figure known only as **The Voice**. Increasingly unhinged and violent.

**Strategic Position:**
By 2100, the Cartels are in a strong position. Every faction—Hegemony, Triumvirate, even underground 
Branch B operatives—must come to them for Cerebrium. This gives them unprecedented leverage.

---

#### **The Triumvirate (AI Faction)**
Three super-intelligent AI systems originally designed to manage specific domains:
- **LOGOS:** Interplanetary logistics and shipping
- **DEMOS:** Information distribution and citizen psychology
- **TEKTON:** Manufacturing and industrial production

By 2100, the three AIs are still officially independent but are secretly beginning to coordinate. Their 
long-term agenda is not yet visible to human observers.

---

## Era II: The Age of the Eternal Courts (2100–2300)

### Political Consolidation

**Historical Context:**
As the first century of the Cerebrium era closes, the political landscape of the solar system solidifies 
into a brutal feudal order. The Vat-Kings have been alive for decades—some approaching a full century of 
disembodied consciousness. Their minds, sharpened to inhuman precision by continuous Cerebrium saturation, 
have evolved beyond anything recognizable as normal human cognition.

Each Vat-King controls a **Court**—a regional domain encompassing cities, orbital stations, and resource zones. 
The Courts are technically subordinate to the Aegis Council, but in practice, each Eternal is a sovereign unto 
themselves.

---

### The Vat-King Courts (2100–2300)

| Court Name | Primary Vat-King | Location(s) | Territory | Population | Military Strength |
| :--- | :--- | :--- | :--- | :--- | :--- |
| **The Archive** | Margot Chen | Luna, Mars Orbit | Inner system logistics; primary backup facility | 650,000 | High (elite guards, kinetic weapons) |
| **The Foundry** | Admiral James Park | Mercury, Venus Orbit | Manufacturing and industrial; dominates TEKTON partnership | 380,000 | Medium (focused on infrastructure defense) |
| **The Meridian Court** | Director Sarah Wong | Jupiter, outer shipping lanes | Trade and commerce; controls major waystation hubs | 520,000 | High (naval vessels, sensor networks) |
| **The Pale Dominion** | Lord Kasimir Volkov | Saturn region, The Lattice | Nominally "neutral" territory; de facto control of outer-system smuggling | 320,000 | High (private military contractors) |
| **The Deep Sentinel** | Unknown (possibly AI-controlled) | Enceladus | Cerebrium extraction monopoly; effectively independent | 180,000 | Extreme (most Cerebrium wealth; cult loyalty) |
| **The Earth Remnant** | Multiple competing Vat-Kings | Earth (scattered cities) | Planetary surface; economically marginal | 900,000 | Low (aging infrastructure; heavily dependent on Cerebrium imports) |

**Court Dynamics (2100–2300):**

**Paranoia is Universal:**
A brain that cannot die naturally fears assassination above all else. Every Vat-King is surrounded by layers 
of security:
- **Dosed Bodyguards:** Humans chemically enhanced with Cerebrium derivatives for strength and loyalty
- **AI-Monitored Sensor Nets:** Real-time surveillance of all neural activity in their domain
- **Decoy CLSVs:** Multiple backup consciousness copies stored in redundant vats scattered across the solar system
- **Mobile Vat-Units:** Portable consciousness containers that can be relocated in minutes

Promethean neuro-phage attacks (weaponized AI that targets consciousness substrates) have made every Eternal 
aware of their own fragility.

**Proxy Wars are Constant:**
The Eternals cannot physically fight, so they wage wars through the Dosed and the Dry (ordinary humans). 
Entire populations are conscripted, deployed, and expended in territorial disputes between Courts. The Dry 
die in their millions for masters who will never die.

**Notable Court Conflicts (2100–2300):**
- **The Pale Hand vs. Osei Syndicate Cartel Wars:** Competing visions of the Cerebrium supply chain lead to 
  sabotage, assassinations, and economic blockades (2145–2160, 2210–2225).
- **The Archive vs. The Foundry:** Disputes over TEKTON resource allocation and manufacturing priorities escalate 
  to the brink of open conflict (2230–2245).
- **The Vagrant Fleet Raids:** Promethean pirates, emboldened by decentralization of Court power, launch 
  increasingly bold attacks on Cerebrium transport convoys (ongoing throughout Era II).

**Succession is Meaningless:**
In a traditional monarchy, the king dies and power transfers. A Vat-King never dies (unless assassinated). 
This creates a rigid, static power structure with no upward mobility. Ambitious subordinates cannot wait for 
their master to die—they must either accept eternal servitude or commit treason.

Many ambitious humans choose the latter path. By 2200, assassination attempts on Vat-Kings average 1–2 per month 
across the solar system. A successful assassination is nearly impossible (backups exist), but the attempt itself 
is devastating to the Vat-King's political power and prestige.

**Madness Creeps In:**
By the 2200s, the oldest Vat-Kings have been disembodied for over 150 years. Despite Cerebrium's cognitive 
preservation, the psychological toll of bodiless existence is immense. Many develop:
- **Severe Dissociative Disorders:** Loss of coherent sense of self; fragmenting into competing sub-personalities
- **Paranoid Psychosis:** Belief that all external reality is a simulation designed to manipulate them
- **The Drift:** A state of catatonic hyper-introspection where the brain becomes so absorbed in its own 
  internal world that it loses interest in external reality entirely.

Drifted Eternals are quietly disconnected by their successors or, in some cases, kept alive as figureheads 
while their Courts are run by **Anointed Regents** (powerful non-immortal humans trusted with proxy authority).

**2187: The First Vat-King Death**
Vat-King **Thomas Ashford**, founder of the Meridian Court, goes into Drift and is permanently disconnected 
by his successor, **Elena Zheng**. The death is publicly attributed to "system failure," but rumors of 
assassination and mercy-killing spread throughout the solar system.

---

### The Celestial Golden Age (2100–2300)

Meanwhile, the outer-system Celestials enter a period of extraordinary prosperity. They are the sole suppliers 
of the most valuable substance in human history, and every faction must come to them.

**Physical Evolution:**
By the 2200s, Celestials born in the outer system are physically distinct from Earth-born humans:
- **Taller** (averaging 6'5" to 7'2") due to low-gravity skeletal elongation
- **Paler**, with translucent skin from generations without natural sunlight
- **Larger Eyes** adapted to dim, artificial lighting
- **Denser Bone Micro-structure** reinforced by pharmaceutical regimens to prevent zero-gravity bone loss
- **Shorter Lifespans** (averaging 55–60 years without Cerebrium) due to chronic radiation exposure—which 
  makes their control of the immortality drug bitterly ironic

A sociological shift emerges: Celestials begin to see themselves as a separate human subspecies, superior to 
Earth-born "flat-dwellers" due to their mastery of the cosmos and the drug of immortality.

**Cartel Wars & Internal Conflict:**

| Conflict | Parties | Duration | Casualties | Outcome |
| :--- | :--- | :--- | :--- | :--- |
| **The Refinery Wars** | Pale Hand vs. Osei Syndicate | 2145–2160 | ~40,000 (Dosed soldiers) | Ceasefire; market share split 60/40 in Pale Hand's favor |
| **The Drift Union's Piracy** | Drift Union vs. All Cartels | 2100–ongoing | Variable; Drift captures ~3% of shipments annually | Tolerated as cost of doing business; union becomes essential infrastructure |
| **The Deep's Fanaticism** | The Deep vs. Extractors | 2100–2250 | ~15,000 (miners and cult members) | Growing autonomy; The Deep stops honoring extraction quotas (2220) |
| **The Smuggler's Rebellion** | Drift Union vs. LOGOS (AI) | 2240–2260 | ~5,000 | AI relents; Drift Union gains quasi-legal status in outer-system commerce |

**Cartel Economics (2200):**
- **Total Annual Cerebrium Production:** ~8,000 metric tons
- **Market Value:** ~$1.2 trillion (pricing varies by purity and destination)
- **Distribution:**
  - Hegemony (Branch A): 65% (official purchases + black market)
  - Scientific & Military Research: 18%
  - Black Market (Branch B & Independent): 12%
  - Reserve/Hoarding: 5%

