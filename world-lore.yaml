  overview: >
    The Cerebrium Era spans 440 years (2060–2500) of human civilization across the solar system.
    It is divided into four major periods, each defined by pivotal technological, political, and 
    biological developments. The story follows the divergence of three human branches—the Hegemony 
    (Branch A), the Promethean Underground (Branch B), and the Celestial Cartels (Branch C)—as 
    they wage proxy wars over the most valuable substance in human history: Cerebrium, an 
    alien-derived compound that grants biological immortality and computational enhancement.

---

## Era I: The Awakening (2060–2100)
### The Discovery and First Colonies

**Historical Context:**
In 2060, human explorers drilling into Enceladus's subsurface ocean discover veins of a crystalline 
mineral of unknown origin. When refined and integrated into the human nervous system via specialized 
vats (Cerebral Long-Substrate Vat, or CLSV), the mineral grants perfect biological immortality and 
superhuman cognitive enhancement. The discovery triggers the greatest power struggle in human history.

Within five years, three major factions emerge:
- **Branch A (The Hegemony):** Earth-based governments and mega-corporations that seize control of the technology.
- **Branch B (The Promethean Underground):** Radical philosophers and dissidents who see immortality as 
  an existential threat to human dignity and autonomy.
- **Branch C (The Celestial Cartels):** Independent miners and operators in the outer system who discover 
  they can monopolize Cerebrium extraction.

By 2100, the first generation of **Vat-Kings**—disembodied human consciousnesses sustained in artificial 
neural substrates—has taken root. The solar system is divided into rival domains of immortal lords.

---

